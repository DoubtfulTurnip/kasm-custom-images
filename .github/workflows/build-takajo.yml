name: Build Takajo Kasm Workspace

on:
  push:
    branches: [main, master]
    paths:
      - "Takajo-Kasm/**"
      - ".github/workflows/build-takajo.yml"
      - ".github/workflows/_build-workspace.yml"
  schedule:
    - cron: "0 2 * * 0" # Weekly Sunday 2 AM UTC
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build-workspace.yml
    with:
      workspace_dir: Takajo-Kasm
      image_name: takajo-kasm
      display_name: Takajō
    permissions:
      contents: read
      packages: write
