name: Check Upstream Versions

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  actions: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT || github.token }}

      - name: Check Trufflehog version
        id: trufflehog
        continue-on-error: true
        run: |
          CURRENT_VERSION=$(grep -oP 'v\d+\.\d+\.\d+' Trufflehog-Kasm/Dockerfile | head -1)
          LATEST_VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/trufflesecurity/trufflehog/releases/latest | jq -r '.tag_name // empty')
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=${LATEST_VERSION:-unknown}" >> $GITHUB_OUTPUT
          if [[ -z "$LATEST_VERSION" || "$LATEST_VERSION" == "null" ]]; then
            echo "::warning::Failed to fetch latest Trufflehog version, skipping"
            exit 0
          fi
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "::notice::Trufflehog update available: $CURRENT_VERSION → $LATEST_VERSION"
            sed -i "s|sh -s -- -b /usr/local/bin $CURRENT_VERSION|sh -s -- -b /usr/local/bin $LATEST_VERSION|g" Trufflehog-Kasm/Dockerfile
            sed -i "s|# ─── Install TruffleHog $CURRENT_VERSION|# ─── Install TruffleHog $LATEST_VERSION|g" Trufflehog-Kasm/Dockerfile
          fi

      - name: Check TruffleHog release notes for new scan sources
        id: trufflehog_notes
        if: steps.trufflehog.outputs.update_available == 'true'
        continue-on-error: true
        run: |
          NOTES=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/trufflesecurity/trufflehog/releases/latest | jq -r '.body // ""')
          echo "## ⚠️ TruffleHog Updated — Review for New Scan Sources" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check release notes for new \`trufflehog <source>\` commands that may need a new tab in \`Trufflehog-Kasm/app.py\`:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$NOTES" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check Sherlock version
        id: sherlock
        continue-on-error: true
        run: |
          CURRENT_VERSION=$(grep -oP 'sherlock-project==\K[\d.]+' SherlockWebUI-Kasm/requirements.txt | head -1)
          LATEST_VERSION=$(curl -s https://pypi.org/pypi/sherlock-project/json | jq -r '.info.version // empty')
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=${LATEST_VERSION:-unknown}" >> $GITHUB_OUTPUT
          if [[ -z "$LATEST_VERSION" || "$LATEST_VERSION" == "null" ]]; then
            echo "::warning::Failed to fetch latest Sherlock version, skipping"
            exit 0
          fi
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "::notice::Sherlock update available: $CURRENT_VERSION → $LATEST_VERSION"
            sed -i "s|sherlock-project==$CURRENT_VERSION|sherlock-project==$LATEST_VERSION|g" SherlockWebUI-Kasm/requirements.txt
          fi

      - name: Check SocialAnalyzer commits
        id: socialanalyzer
        continue-on-error: true
        run: |
          CURRENT_COMMIT=$(grep -oP 'ARG SOCIAL_ANALYZER_COMMIT=\K[a-f0-9]{40}' SocialAnalyzer-Kasm/Dockerfile | head -1)
          LATEST_COMMIT=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/qeeqbox/social-analyzer/commits/main | jq -r '.sha // empty')
          if [[ -z "$LATEST_COMMIT" || "$LATEST_COMMIT" == "null" ]]; then
            echo "::warning::Failed to fetch latest SocialAnalyzer commit, skipping"
            echo "current=${CURRENT_COMMIT:0:7}" >> $GITHUB_OUTPUT
            echo "latest=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi
          CURRENT_SHORT="${CURRENT_COMMIT:0:7}"
          LATEST_SHORT="${LATEST_COMMIT:0:7}"
          echo "current=$CURRENT_SHORT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_SHORT" >> $GITHUB_OUTPUT
          echo "current_full=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          echo "latest_full=$LATEST_COMMIT" >> $GITHUB_OUTPUT
          if [ "$CURRENT_COMMIT" != "$LATEST_COMMIT" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "::notice::SocialAnalyzer update available: $CURRENT_SHORT → $LATEST_SHORT"
            sed -i "s|ARG SOCIAL_ANALYZER_COMMIT=$CURRENT_COMMIT|ARG SOCIAL_ANALYZER_COMMIT=$LATEST_COMMIT|g" SocialAnalyzer-Kasm/Dockerfile
          fi

      - name: Check Webcheck version
        id: webcheck
        continue-on-error: true
        run: |
          CURRENT_VERSION=$(grep -oP 'branch \K\d+\.\d+\.\d+' Webcheck-Kasm/Dockerfile | head -1)
          LATEST_VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/Lissy93/web-check/releases/latest | jq -r '.tag_name // empty' | sed 's/^v//')
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=${LATEST_VERSION:-unknown}" >> $GITHUB_OUTPUT
          if [[ -z "$LATEST_VERSION" || "$LATEST_VERSION" == "null" ]]; then
            echo "::warning::Failed to fetch latest Webcheck version, skipping"
            exit 0
          fi
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "::notice::Webcheck update available: $CURRENT_VERSION → $LATEST_VERSION"
            sed -i "s|--branch $CURRENT_VERSION|--branch $LATEST_VERSION|g" Webcheck-Kasm/Dockerfile
          fi

      - name: Check Hayabusa version (Takajo component)
        id: hayabusa
        continue-on-error: true
        run: |
          CURRENT_VERSION=$(grep -oP 'hayabusa/releases/download/v\K\d+\.\d+\.\d+' Takajo-Kasm/Dockerfile | head -1)
          LATEST_VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/Yamato-Security/hayabusa/releases/latest | jq -r '.tag_name // empty' | sed 's/^v//')
          echo "current=v$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=v${LATEST_VERSION:-unknown}" >> $GITHUB_OUTPUT
          if [[ -z "$LATEST_VERSION" || "$LATEST_VERSION" == "null" ]]; then
            echo "::warning::Failed to fetch latest Hayabusa version, skipping"
            exit 0
          fi
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "::notice::Hayabusa update available: v$CURRENT_VERSION → v$LATEST_VERSION"
            sed -i "s|hayabusa/releases/download/v$CURRENT_VERSION/hayabusa-$CURRENT_VERSION|hayabusa/releases/download/v$LATEST_VERSION/hayabusa-$LATEST_VERSION|g" Takajo-Kasm/Dockerfile
          fi

      - name: Check Takajo version
        id: takajo
        continue-on-error: true
        run: |
          CURRENT_VERSION=$(grep -oP 'takajo/releases/download/v\K\d+\.\d+\.\d+' Takajo-Kasm/Dockerfile | head -1)
          LATEST_VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/Yamato-Security/takajo/releases/latest | jq -r '.tag_name // empty' | sed 's/^v//')
          echo "current=v$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=v${LATEST_VERSION:-unknown}" >> $GITHUB_OUTPUT
          if [[ -z "$LATEST_VERSION" || "$LATEST_VERSION" == "null" ]]; then
            echo "::warning::Failed to fetch latest Takajō version, skipping"
            exit 0
          fi
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "::notice::Takajo update available: v$CURRENT_VERSION → v$LATEST_VERSION"
            sed -i "s|takajo/releases/download/v$CURRENT_VERSION/takajo-$CURRENT_VERSION|takajo/releases/download/v$LATEST_VERSION/takajo-$LATEST_VERSION|g" Takajo-Kasm/Dockerfile
            sed -i "s|takajo-$CURRENT_VERSION-lin-x64-gnu|takajo-$LATEST_VERSION-lin-x64-gnu|g" Takajo-Kasm/Dockerfile
            sed -i "s|Install Takajō v$CURRENT_VERSION|Install Takajō v$LATEST_VERSION|g" Takajo-Kasm/Dockerfile
          fi

      - name: Check Chainsaw version (Takajo component)
        id: chainsaw
        continue-on-error: true
        run: |
          CURRENT_VERSION=$(grep -oP 'chainsaw/releases/download/v\K\d+\.\d+\.\d+' Takajo-Kasm/Dockerfile | head -1)
          LATEST_VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/WithSecureLabs/chainsaw/releases/latest | jq -r '.tag_name // empty' | sed 's/^v//')
          echo "current=v$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=v${LATEST_VERSION:-unknown}" >> $GITHUB_OUTPUT
          if [[ -z "$LATEST_VERSION" || "$LATEST_VERSION" == "null" ]]; then
            echo "::warning::Failed to fetch latest Chainsaw version, skipping"
            exit 0
          fi
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "::notice::Chainsaw update available: v$CURRENT_VERSION → v$LATEST_VERSION"
            sed -i "s|chainsaw/releases/download/v$CURRENT_VERSION/|chainsaw/releases/download/v$LATEST_VERSION/|g" Takajo-Kasm/Dockerfile
          fi

      - name: Check Epagneul version
        id: epagneul
        continue-on-error: true
        run: |
          CURRENT_VERSION=$(grep -oP 'git clone --branch \K[^ ]+' Epagneul-Kasm/Dockerfile | head -1)
          LATEST_VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/jurelou/epagneul/tags?per_page=100" | jq -r '.[].name' | sort -V | tail -1)
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=${LATEST_VERSION:-unknown}" >> $GITHUB_OUTPUT
          if [[ -z "$LATEST_VERSION" || "$LATEST_VERSION" == "null" ]]; then
            echo "::warning::Failed to fetch latest Epagneul version, skipping"
            exit 0
          fi
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "::notice::Epagneul update available: $CURRENT_VERSION → $LATEST_VERSION"
            sed -i "s|--branch $CURRENT_VERSION|--branch $LATEST_VERSION|g" Epagneul-Kasm/Dockerfile
          fi

      - name: Check Slasher commits
        id: slasher
        continue-on-error: true
        run: |
          CURRENT_COMMIT=$(grep -oP 'git checkout \K[a-f0-9]{40}' Slasher-Kasm/Dockerfile | head -1)
          LATEST_COMMIT=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/hexastrike/slasher/commits/main | jq -r '.sha // empty')
          if [[ -z "$LATEST_COMMIT" || "$LATEST_COMMIT" == "null" ]]; then
            echo "::warning::Failed to fetch latest Slasher commit, skipping"
            echo "current=${CURRENT_COMMIT:0:7}" >> $GITHUB_OUTPUT
            echo "latest=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi
          CURRENT_SHORT="${CURRENT_COMMIT:0:7}"
          LATEST_SHORT="${LATEST_COMMIT:0:7}"
          echo "current=$CURRENT_SHORT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_SHORT" >> $GITHUB_OUTPUT
          if [ "$CURRENT_COMMIT" != "$LATEST_COMMIT" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "::notice::Slasher update available: $CURRENT_SHORT → $LATEST_SHORT"
            sed -i "s|git checkout $CURRENT_COMMIT|git checkout $LATEST_COMMIT|g" Slasher-Kasm/Dockerfile
          fi

      - name: Check BloodHound commits
        id: bloodhound
        continue-on-error: true
        run: |
          CURRENT_COMMIT=$(grep -oP '(?<=SpecterOps/bloodhound/)[a-f0-9]{40}' BloodHound-Kasm/Dockerfile | head -1)
          LATEST_COMMIT=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/SpecterOps/bloodhound/commits/main | jq -r '.sha // empty')
          if [[ -z "$LATEST_COMMIT" || "$LATEST_COMMIT" == "null" ]]; then
            echo "::warning::Failed to fetch latest BloodHound commit, skipping"
            echo "current=${CURRENT_COMMIT:0:7}" >> $GITHUB_OUTPUT
            echo "latest=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi
          CURRENT_SHORT="${CURRENT_COMMIT:0:7}"
          LATEST_SHORT="${LATEST_COMMIT:0:7}"
          echo "current=$CURRENT_SHORT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_SHORT" >> $GITHUB_OUTPUT
          if [ "$CURRENT_COMMIT" != "$LATEST_COMMIT" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "::notice::BloodHound update available: $CURRENT_SHORT → $LATEST_SHORT"
            sed -i "s|SpecterOps/bloodhound/$CURRENT_COMMIT|SpecterOps/bloodhound/$LATEST_COMMIT|g" BloodHound-Kasm/Dockerfile
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No version updates needed"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Version updates detected"
          fi

      - name: Commit and push changes
        id: commit_changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "chore: auto-update application versions" > commit_msg.txt
          echo "" >> commit_msg.txt
          echo "Updated versions:" >> commit_msg.txt

          [ "${{ steps.trufflehog.outputs.update_available }}" == "true" ] && \
            echo "- Trufflehog: ${{ steps.trufflehog.outputs.current }} → ${{ steps.trufflehog.outputs.latest }}" >> commit_msg.txt
          [ "${{ steps.sherlock.outputs.update_available }}" == "true" ] && \
            echo "- Sherlock: ${{ steps.sherlock.outputs.current }} → ${{ steps.sherlock.outputs.latest }}" >> commit_msg.txt
          [ "${{ steps.socialanalyzer.outputs.update_available }}" == "true" ] && \
            echo "- SocialAnalyzer: ${{ steps.socialanalyzer.outputs.current }} → ${{ steps.socialanalyzer.outputs.latest }}" >> commit_msg.txt
          [ "${{ steps.webcheck.outputs.update_available }}" == "true" ] && \
            echo "- Webcheck: ${{ steps.webcheck.outputs.current }} → ${{ steps.webcheck.outputs.latest }}" >> commit_msg.txt
          [ "${{ steps.hayabusa.outputs.update_available }}" == "true" ] && \
            echo "- Hayabusa: ${{ steps.hayabusa.outputs.current }} → ${{ steps.hayabusa.outputs.latest }}" >> commit_msg.txt
          [ "${{ steps.takajo.outputs.update_available }}" == "true" ] && \
            echo "- Takajo: ${{ steps.takajo.outputs.current }} → ${{ steps.takajo.outputs.latest }}" >> commit_msg.txt
          [ "${{ steps.chainsaw.outputs.update_available }}" == "true" ] && \
            echo "- Chainsaw: ${{ steps.chainsaw.outputs.current }} → ${{ steps.chainsaw.outputs.latest }}" >> commit_msg.txt
          [ "${{ steps.epagneul.outputs.update_available }}" == "true" ] && \
            echo "- Epagneul: ${{ steps.epagneul.outputs.current }} → ${{ steps.epagneul.outputs.latest }}" >> commit_msg.txt
          [ "${{ steps.slasher.outputs.update_available }}" == "true" ] && \
            echo "- Slasher: ${{ steps.slasher.outputs.current }} → ${{ steps.slasher.outputs.latest }}" >> commit_msg.txt
          [ "${{ steps.bloodhound.outputs.update_available }}" == "true" ] && \
            echo "- BloodHound: ${{ steps.bloodhound.outputs.current }} → ${{ steps.bloodhound.outputs.latest }}" >> commit_msg.txt

          echo "" >> commit_msg.txt
          echo "Automated update by check-versions workflow" >> commit_msg.txt

          git add -A
          git commit -F commit_msg.txt
          COMMITTED_SHA=$(git rev-parse HEAD)
          echo "committed_sha=$COMMITTED_SHA" >> "$GITHUB_OUTPUT"
          git push

      # Explicitly dispatch each affected build workflow.
      # GITHUB_TOKEN pushes do not cascade to trigger other workflows — only PAT-authenticated
      # pushes do. We use gh workflow run as a workaround.
      - name: Trigger affected build workflows
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # gh workflow run requires a branch or tag name, not a commit SHA.
          # The version-bump commit was just pushed to main, so main HEAD == the update.
          UPDATED_REF="main"

          echo "Dispatching build workflows at ref: $UPDATED_REF"

          if [ "${{ steps.trufflehog.outputs.update_available }}" == "true" ]; then
            gh workflow run build-trufflehog.yml --ref "$UPDATED_REF"
            echo "Triggered: build-trufflehog.yml"
          fi
          if [ "${{ steps.sherlock.outputs.update_available }}" == "true" ]; then
            gh workflow run build-sherlock.yml --ref "$UPDATED_REF"
            echo "Triggered: build-sherlock.yml"
          fi
          if [ "${{ steps.socialanalyzer.outputs.update_available }}" == "true" ]; then
            gh workflow run build-socialanalyzer.yml --ref "$UPDATED_REF"
            echo "Triggered: build-socialanalyzer.yml"
          fi
          if [ "${{ steps.webcheck.outputs.update_available }}" == "true" ]; then
            gh workflow run build-webcheck.yml --ref "$UPDATED_REF"
            echo "Triggered: build-webcheck.yml"
          fi
          if [ "${{ steps.hayabusa.outputs.update_available }}" == "true" ] || \
             [ "${{ steps.takajo.outputs.update_available }}" == "true" ] || \
             [ "${{ steps.chainsaw.outputs.update_available }}" == "true" ]; then
            gh workflow run build-takajo.yml --ref "$UPDATED_REF"
            echo "Triggered: build-takajo.yml"
          fi
          if [ "${{ steps.epagneul.outputs.update_available }}" == "true" ]; then
            gh workflow run build-epagneul.yml --ref "$UPDATED_REF"
            echo "Triggered: build-epagneul.yml"
          fi
          if [ "${{ steps.slasher.outputs.update_available }}" == "true" ]; then
            gh workflow run build-slasher.yml --ref "$UPDATED_REF"
            echo "Triggered: build-slasher.yml"
          fi
          [ "${{ steps.bloodhound.outputs.update_available }}" == "true" ] && \
            gh workflow run build-bloodhound.yml --ref "$UPDATED_REF" && echo "Triggered: build-bloodhound.yml"

      - name: Create summary
        run: |
          echo "# Version Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Application | Current | Latest | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|---------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trufflehog | ${{ steps.trufflehog.outputs.current }} | ${{ steps.trufflehog.outputs.latest }} | ${{ steps.trufflehog.outputs.update_available == 'true' && 'Auto-Updated ✅' || 'Up to Date' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sherlock | ${{ steps.sherlock.outputs.current }} | ${{ steps.sherlock.outputs.latest }} | ${{ steps.sherlock.outputs.update_available == 'true' && 'Auto-Updated ✅' || 'Up to Date' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SocialAnalyzer | ${{ steps.socialanalyzer.outputs.current }} | ${{ steps.socialanalyzer.outputs.latest }} | ${{ steps.socialanalyzer.outputs.update_available == 'true' && 'Auto-Updated ✅' || 'Up to Date' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Webcheck | ${{ steps.webcheck.outputs.current }} | ${{ steps.webcheck.outputs.latest }} | ${{ steps.webcheck.outputs.update_available == 'true' && 'Auto-Updated ✅' || 'Up to Date' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hayabusa | ${{ steps.hayabusa.outputs.current }} | ${{ steps.hayabusa.outputs.latest }} | ${{ steps.hayabusa.outputs.update_available == 'true' && 'Auto-Updated ✅' || 'Up to Date' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Takajo | ${{ steps.takajo.outputs.current }} | ${{ steps.takajo.outputs.latest }} | ${{ steps.takajo.outputs.update_available == 'true' && 'Auto-Updated ✅' || 'Up to Date' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Chainsaw | ${{ steps.chainsaw.outputs.current }} | ${{ steps.chainsaw.outputs.latest }} | ${{ steps.chainsaw.outputs.update_available == 'true' && 'Auto-Updated ✅' || 'Up to Date' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Epagneul | ${{ steps.epagneul.outputs.current }} | ${{ steps.epagneul.outputs.latest }} | ${{ steps.epagneul.outputs.update_available == 'true' && 'Auto-Updated ✅' || 'Up to Date' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slasher | ${{ steps.slasher.outputs.current }} | ${{ steps.slasher.outputs.latest }} | ${{ steps.slasher.outputs.update_available == 'true' && 'Auto-Updated ✅' || 'Up to Date' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| BloodHound | ${{ steps.bloodhound.outputs.current }} | ${{ steps.bloodhound.outputs.latest }} | ${{ steps.bloodhound.outputs.update_available == 'true' && 'Auto-Updated ✅' || 'Up to Date' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "## Automatic Updates Applied" >> $GITHUB_STEP_SUMMARY
            echo "Dockerfiles updated, committed, and affected build workflows dispatched." >> $GITHUB_STEP_SUMMARY
          else
            echo "## All Applications Up to Date" >> $GITHUB_STEP_SUMMARY
            echo "No updates needed." >> $GITHUB_STEP_SUMMARY
          fi
