name: Build SherlockWebUI Kasm Workspace

on:
  push:
    branches: [main, master]
    paths:
      - "SherlockWebUI-Kasm/**"
      - ".github/workflows/build-sherlock.yml"
      - ".github/workflows/_build-workspace.yml"
  schedule:
    - cron: "0 2 * * 0" # Weekly Sunday 2 AM UTC
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build-workspace.yml
    with:
      workspace_dir: SherlockWebUI-Kasm
      image_name: sherlockwebui-kasm
      display_name: SherlockWebUI
    permissions:
      contents: read
      packages: write
