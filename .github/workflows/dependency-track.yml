- name: Upload SBOM to Dependency-Track
  shell: bash
  env:
    DEPENDENCYTRACK_API_KEY: ${{ secrets.DEPENDENCYTRACK_API_KEY }}
  run: |
    HTTP_STATUS="$(
      curl \
        --silent \
        --show-error \
        --output dependency-track-response.txt \
        --write-out '%{http_code}' \
        --request POST \
        --header "X-Api-Key: ${DEPENDENCYTRACK_API_KEY}" \
        --form "autoCreate=true" \
        --form "projectName=${{ github.event.repository.name }}" \
        --form "projectVersion=main" \
        --form "bom=@bom.json;type=application/json" \
        "https://deptrack.skullnet.co.uk/api/v1/bom"
    )"

    echo "Dependency-Track returned HTTP ${HTTP_STATUS}"
    echo
    echo "Response body:"
    cat dependency-track-response.txt
    echo

    if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
      exit 1
    fi
