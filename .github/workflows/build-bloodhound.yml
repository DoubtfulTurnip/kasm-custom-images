name: Build BloodHound Kasm Workspace

on:
  push:
    branches: [main, master]
    paths:
      - "BloodHound-Kasm/**"
      - ".github/workflows/build-bloodhound.yml"
      - ".github/workflows/_build-workspace.yml"
  schedule:
    - cron: "0 2 * * 0" # Weekly Sunday 2 AM UTC
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build-workspace.yml
    with:
      workspace_dir: BloodHound-Kasm
      image_name: bloodhound-kasm
      display_name: BloodHound CE
    permissions:
      contents: read
      packages: write
