name: Build SocialAnalyzer Kasm Workspace

on:
  push:
    branches: [main, master]
    paths:
      - "SocialAnalyzer-Kasm/**"
      - ".github/workflows/build-socialanalyzer.yml"
  schedule:
    - cron: "0 2 * * 0" # Weekly Sunday 2 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: doubtfulturnip
  WORKSPACE_IMAGE_NAME: socialanalyzer-kasm
  APP_IMAGE_NAME: socialanalyzer-app
  WORKSPACE_VERSION: 1.19.0

jobs:
  build-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set image metadata
        id: meta
        run: |
          SOCIAL_ANALYZER_COMMIT=$(grep -oP 'ARG SOCIAL_ANALYZER_COMMIT=\K[a-f0-9]{40}' SocialAnalyzer-Kasm/Dockerfile | head -1)
          echo "social_analyzer_commit=$SOCIAL_ANALYZER_COMMIT" >> "$GITHUB_OUTPUT"
          echo "app_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_IMAGE_NAME }}:$SOCIAL_ANALYZER_COMMIT" >> "$GITHUB_OUTPUT"
          echo "workspace_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.WORKSPACE_IMAGE_NAME }}:${{ env.WORKSPACE_VERSION }}" >> "$GITHUB_OUTPUT"

      - name: Prepare SocialAnalyzer app build context
        run: |
          git clone --depth 1 https://github.com/qeeqbox/social-analyzer.git /tmp/social-analyzer-app
          cd /tmp/social-analyzer-app
          git fetch --depth 1 origin "${{ steps.meta.outputs.social_analyzer_commit }}"
          git checkout "${{ steps.meta.outputs.social_analyzer_commit }}"
          cp "$GITHUB_WORKSPACE/SocialAnalyzer-Kasm/app.Dockerfile" Dockerfile
          cp "$GITHUB_WORKSPACE/SocialAnalyzer-Kasm/app.dockerignore" .dockerignore

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SocialAnalyzer app image
        uses: docker/build-push-action@v7
        with:
          context: /tmp/social-analyzer-app
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.app_image }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.APP_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/qeeqbox/social-analyzer
            org.opencontainers.image.revision=${{ steps.meta.outputs.social_analyzer_commit }}
          cache-from: type=gha,scope=socialanalyzer-app
          cache-to: type=gha,mode=max,scope=socialanalyzer-app

      - name: Build and push workspace image
        uses: docker/build-push-action@v7
        with:
          context: SocialAnalyzer-Kasm
          platforms: linux/amd64
          push: true
          build-args: |
            SOCIAL_ANALYZER_APP_IMAGE=${{ steps.meta.outputs.app_image }}
          tags: |
            ${{ steps.meta.outputs.workspace_image }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.WORKSPACE_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/DoubtfulTurnip/kasm-custom-images
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=socialanalyzer-workspace
          cache-to: type=gha,mode=max,scope=socialanalyzer-workspace

      - name: Build summary
        run: |
          echo "# SocialAnalyzer Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Images Built and Pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workspace Image: \`${{ steps.meta.outputs.workspace_image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- App Image: \`${{ steps.meta.outputs.app_image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Runtime Behavior" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workspace startup pulls the prebuilt GHCR app image instead of building SocialAnalyzer inside Kasm." >> "$GITHUB_STEP_SUMMARY"
          echo "- The nested Compose stack no longer starts Selenium hub/node containers." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Usage" >> "$GITHUB_STEP_SUMMARY"
          echo "Update your Kasm workspace to use: \`${{ steps.meta.outputs.workspace_image }}\`" >> "$GITHUB_STEP_SUMMARY"
