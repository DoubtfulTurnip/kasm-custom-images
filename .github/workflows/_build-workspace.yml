name: Build Kasm Workspace (Reusable)

on:
  workflow_call:
    inputs:
      workspace_dir:
        description: "Directory containing the Dockerfile (relative to repo root)"
        required: true
        type: string
      image_name:
        description: "Image name without registry prefix (e.g. trufflehog-kasm)"
        required: true
        type: string
      display_name:
        description: "Human-readable label used in the build summary"
        required: false
        type: string
        default: ""

# Callers must grant packages: write for GHCR push to succeed.
# contents: read is inherited from the default token.

concurrency:
  group: build-${{ inputs.image_name }}
  cancel-in-progress: false  # queue rather than cancel; latest commit always publishes

jobs:
  build-workspace:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Derive lowercase registry namespace
        id: ns
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push workspace image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.workspace_dir }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner }}/${{ inputs.image_name }}:1.19.0
            ghcr.io/${{ steps.ns.outputs.owner }}/${{ inputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          LABEL="${{ inputs.display_name }}"
          [ -z "$LABEL" ] && LABEL="${{ inputs.image_name }}"
          echo "# ✅ ${LABEL} Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image pushed to GHCR:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ steps.ns.outputs.owner }}/${{ inputs.image_name }}:1.19.0\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ steps.ns.outputs.owner }}/${{ inputs.image_name }}:latest\`" >> $GITHUB_STEP_SUMMARY
