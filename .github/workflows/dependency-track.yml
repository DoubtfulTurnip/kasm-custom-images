name: Dependency-Track SBOM

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-track:
    name: Generate and upload SBOM
    runs-on:
      - self-hosted
      - dependency-track

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cdxgen@latest \
            --spec-version 1.6 \
            --output bom.json \
            .

      - name: Validate generated SBOM
        run: |
          test -s bom.json
          node -e '
            const bom = require("./bom.json");
            console.log("CycloneDX specification: " + bom.specVersion);
            console.log("Components: " + (bom.components || []).length);
            if (bom.specVersion !== "1.6") process.exit(1);
          '

      - name: Upload SBOM to Dependency-Track
        shell: bash
        env:
          DEPENDENCYTRACK_API_KEY: ${{ secrets.DEPENDENCYTRACK_API_KEY }}
        run: |
          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --output dependency-track-response.txt \
              --write-out '%{http_code}' \
              --request POST \
              --header "X-Api-Key: ${DEPENDENCYTRACK_API_KEY}" \
              --form "autoCreate=true" \
              --form "projectName=${{ github.event.repository.name }}" \
              --form "projectVersion=${{ github.ref_name }}" \
              --form "bom=@bom.json;type=application/json" \
              "http://apiserver:8080/api/v1/bom"
          )"

          echo "Dependency-Track returned HTTP ${HTTP_STATUS}"
          cat dependency-track-response.txt
          echo

          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            exit 1
          fi

      - name: Save diagnostic files
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-track-diagnostics
          path: |
            bom.json
            dependency-track-response.txt
          if-no-files-found: warn
          retention-days: 14
