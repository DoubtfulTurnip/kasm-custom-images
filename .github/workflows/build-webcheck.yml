name: Build Webcheck Kasm Workspace

on:
  push:
    branches: [main, master]
    paths:
      - "Webcheck-Kasm/**"
      - ".github/workflows/build-webcheck.yml"
      - ".github/workflows/_build-workspace.yml"
  schedule:
    - cron: "0 2 * * 0" # Weekly Sunday 2 AM UTC
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build-workspace.yml
    with:
      workspace_dir: Webcheck-Kasm
      image_name: webcheck-kasm
      display_name: Webcheck
    permissions:
      contents: read
      packages: write
