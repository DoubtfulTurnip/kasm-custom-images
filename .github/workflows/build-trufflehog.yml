name: Build Trufflehog Kasm Workspace

on:
  push:
    branches: [main, master]
    paths:
      - "Trufflehog-Kasm/**"
      - ".github/workflows/build-trufflehog.yml"
  schedule:
    - cron: "0 2 * * 0" # Weekly Sunday 2 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: doubtfulturnip
  IMAGE_NAME: trufflehog-kasm
  WORKSPACE_VERSION: 1.19.0

jobs:
  build-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "versioned_image=$IMAGE:${{ env.WORKSPACE_VERSION }}" >> "$GITHUB_OUTPUT"
          echo "latest_image=$IMAGE:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push workspace image
        uses: docker/build-push-action@v7
        with:
          context: Trufflehog-Kasm
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.versioned_image }}
            ${{ steps.meta.outputs.latest_image }}
          labels: |
            org.opencontainers.image.source=https://github.com/DoubtfulTurnip/kasm-custom-images
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=trufflehog-workspace
          cache-to: type=gha,mode=max,scope=trufflehog-workspace

      - name: Build summary
        run: |
          echo "# ✅ Trufflehog Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 📦 Image Built and Pushed:" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Workspace Image:** \`${{ steps.meta.outputs.versioned_image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Latest Image:** \`${{ steps.meta.outputs.latest_image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 🚀 Features:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trufflehog secrets scanning tool" >> "$GITHUB_STEP_SUMMARY"
          echo "- Streamlit web interface" >> "$GITHUB_STEP_SUMMARY"
          echo "- Find credentials in git repositories and filesystems" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 📋 Usage:" >> "$GITHUB_STEP_SUMMARY"
          echo "Update your Kasm workspace to use: \`${{ steps.meta.outputs.versioned_image }}\`" >> "$GITHUB_STEP_SUMMARY"
