name: Build Slasher Kasm Workspace

on:
  push:
    branches: [main, master]
    paths:
      - "Slasher-Kasm/**"
      - ".github/workflows/build-slasher.yml"
      - ".github/workflows/_build-workspace.yml"
  schedule:
    - cron: "0 2 * * 0" # Weekly Sunday 2 AM UTC
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build-workspace.yml
    with:
      workspace_dir: Slasher-Kasm
      image_name: slasher-kasm
      display_name: Slasher
    permissions:
      contents: read
      packages: write
