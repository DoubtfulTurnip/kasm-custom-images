name: Build Epagneul Kasm Workspace (Runtime Build)

on:
  push:
    branches: [main, master]
    paths:
      - "Epagneul-Kasm/**"
      - ".github/workflows/build-epagneul.yml"
      - ".github/workflows/_build-workspace.yml"
  schedule:
    - cron: "0 2 * * 0" # Weekly Sunday 2 AM UTC
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build-workspace.yml
    with:
      workspace_dir: Epagneul-Kasm
      image_name: epagneul-kasm
      display_name: Epagneul
    permissions:
      contents: read
      packages: write
